<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIST</title>
</head>
<body>
    <!-- // html lists
    // ordered lists and unordered lists 
    // you start with the ul tag then inside the ul tag use the li tag then vice versa to the orderd list but here you use ol tag
    // description lis you start with the dl tag then dt then dd continously thes are the tags used -->

    <h1>LIST</h1>
    <h2>Types Of lists</h2>
    <h6>ordered lists</h6> <br>
    <ol type="i">
        <li>mercedes benz</li>
        <li>toyota harrier</li>
        <li>mazda demio</li>
        <li> toyota vitz</li>
    </ol><br>

    <h6> unordered list</h6>



    <ul style="list-style-type: square;" >
        <li>tea</li>
        <li> strong tea</li>
        <li>hibiscus tea</li>
        <li>capuchino</li>
        <li>nylon</li>

    </ul><br>

    <h6> description list</h6><br>
    <dl style="list-style-type: lower-greek;" >

    <dt>mercedes</dt>
    <dd> c 63,g 63, e 63</dd>
    <dt>subaru </dt>
    <dd> legacy</dd>
    <dt>toyota</dt>
    <dd> crown</dd>
    </dl>


    
</body>
</html>
